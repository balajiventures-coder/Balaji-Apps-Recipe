<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#D84315">
    <title>Bakery Recipes</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="apple-touch-icon" href="icon-192.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body, iframe {
            width: 100%;
            height: 100%;
            border: none;
            overflow: hidden;
        }
        body {
            background: #FBE9E7;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }

        /* Loading screen shown while iframe loads */
        #loader {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #D84315, #BF360C);
            z-index: 10;
            transition: opacity 0.4s ease;
        }
        #loader.hidden {
            opacity: 0;
            pointer-events: none;
        }
        #loader svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
        }
        #loader h1 {
            color: #fff;
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        #loader p {
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            margin-top: 8px;
        }
        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: #fff;
            border-radius: 50%;
            margin-top: 24px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        iframe {
            position: fixed;
            inset: 0;
        }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div id="loader">
        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="50" cy="50" r="45" fill="rgba(255,255,255,0.15)"/>
            <text x="50" y="58" text-anchor="middle" font-size="42" fill="#fff">🍞</text>
        </svg>
        <h1>Bakery Recipes</h1>
        <p>Loading your recipes...</p>
        <div class="spinner"></div>
    </div>

    <!-- Your App Script loads here -->
    <!-- ⚠️ REPLACE THE URL BELOW WITH YOUR ACTUAL APPS SCRIPT URL ⚠️ -->
    <iframe 
        id="app" 
        src="YOUR_RECIPE_APP_SCRIPT_URL_HERE"
        allow="fullscreen"
        loading="eager">
    </iframe>

    <script>
        // Hide loader once iframe content loads
        const iframe = document.getElementById('app');
        const loader = document.getElementById('loader');
        iframe.addEventListener('load', () => {
            setTimeout(() => loader.classList.add('hidden'), 500);
        });
        // Fallback: hide loader after 8 seconds even if load event doesn't fire
        setTimeout(() => loader.classList.add('hidden'), 8000);

        // Register the service worker for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
